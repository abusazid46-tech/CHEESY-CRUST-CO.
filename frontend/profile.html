<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Cheesy Crust Co.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0c0b09;
      font-family: 'Open Sans', sans-serif;
      color: #eeeeee;
      min-height: 100vh;
    }
    :root {
      --gold: #cda45e;
      --gold-dark: #b58d4a;
      --card-bg: #1a1814;
      --card-light: #2a2621;
    }
    .navbar {
      background: rgba(12, 11, 9, 0.95);
      padding: 1.2rem 0;
      border-bottom: 1px solid rgba(205, 164, 94, 0.2);
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold) !important;
    }
    .profile-container {
      max-width: 1200px;
      margin: 120px auto 50px;
      padding: 0 20px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #0c0b09;
      font-weight: 600;
    }
    .profile-tabs {
      display: flex;
      gap: 1rem;
      border-bottom: 1px solid rgba(205,164,94,0.3);
      padding-bottom: 0.5rem;
      margin-bottom: 2rem;
    }
    .profile-tab {
      background: transparent;
      border: none;
      color: #ddd;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .profile-tab.active {
      background: var(--gold);
      color: #0c0b09;
    }
    .profile-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid rgba(205,164,94,0.15);
      margin-bottom: 1.5rem;
    }
    .form-control, .form-select {
      background: #0c0b09;
      border: 1px solid #3a352e;
      color: white;
      padding: 12px;
      border-radius: 12px;
    }
    .form-control:focus {
      background: #1a1814;
      border-color: var(--gold);
      box-shadow: 0 0 0 0.25rem rgba(205,164,94,0.25);
      color: white;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #0c0b09;
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      border-radius: 50px;
    }
    .order-history-item {
      background: var(--card-light);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--gold);
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .dropdown-item {
    padding: 10px 20px;
    transition: all 0.2s;
}
.dropdown-item:hover {
    background: rgba(205,164,94,0.2);
    color: var(--gold) !important;
}
.user-icon .dropdown-menu {
    margin-top: 10px;
}
    .status-delivered { background: #28a745; color: white; }
    .status-pending { background: #ffc107; color: #0c0b09; }
    .status-preparing { background: #17a2b8; color: white; }
  </style>
</head>
<body>

<nav class="navbar fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="https://i.ibb.co/1JQyJGfH/logo.png" alt="Logo" height="45" style="border-radius: 50%;">
      Cheesy Crust Co.
    </a>
    
    <div style="display: flex; align-items: center; gap: 15px;">
      <!-- User Dropdown Menu -->
      <div class="user-icon dropdown">
        <i class="fas fa-user-circle" data-bs-toggle="dropdown" style="cursor: pointer; font-size: 1.8rem; color: #cda45e;"></i>
        <ul class="dropdown-menu dropdown-menu-end" style="background: #1a1814; border: 1px solid rgba(205,164,94,0.3);">
          <li><a class="dropdown-item" href="index.html" style="color: white;"><i class="fas fa-home gold-icon"></i> Home</a></li>
          <li><a class="dropdown-item" href="#" id="logoutBtn" style="color: white;"><i class="fas fa-sign-out-alt gold-icon"></i> Logout</a></li>
        </ul>
      </div>
      
      <!-- Back to Home Button -->
      <a href="index.html" class="btn-outline-gold" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px 20px; border-radius:40px; text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>
</nav>

<div class="profile-container">
  <div class="profile-header">
    <div class="profile-avatar" id="profileInitials">CC</div>
    <div>
      <h2 style="color: var(--gold);" id="profileName">Customer Name</h2>
      <p id="profilePhone"><i class="fas fa-phone-alt gold-icon"></i> +91 98765 43210</p>
      <p id="profileMemberSince"><i class="fas fa-calendar-alt gold-icon"></i> Member since 2024</p>
    </div>
  </div>

  <div class="profile-tabs">
    <button class="profile-tab active" data-tab="profile">Profile</button>
    <button class="profile-tab" data-tab="orders">Order History</button>
    <button class="profile-tab" data-tab="addresses">Saved Addresses</button>
    <button class="profile-tab" data-tab="reviews">My Reviews</button>
  </div>

  <!-- Profile Tab -->
  <div id="tab-profile" class="tab-content">
    <div class="profile-card">
      <h4 style="color: var(--gold); margin-bottom: 1.5rem;">Personal Information</h4>
      <form id="profileForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="editName" placeholder="John Doe">
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="editPhone" placeholder="+91 98765 43210" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email (Optional)</label>
            <input type="email" class="form-control" id="editEmail" placeholder="john@example.com">
          </div>
          <div class="col-md-6">
            <label class="form-label">Date of Birth (Optional)</label>
            <input type="date" class="form-control" id="editDob">
          </div>
          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-gold">Save Changes</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Orders Tab -->
  <div id="tab-orders" class="tab-content" style="display: none;">
    <div class="profile-card">
      <h4 style="color: var(--gold); margin-bottom: 1.5rem;">Order History</h4>
      <div id="orderHistoryContainer"></div>
    </div>
  </div>

  <!-- Addresses Tab -->
  <div id="tab-addresses" class="tab-content" style="display: none;">
    <div class="profile-card">
      <h4 style="color: var(--gold); margin-bottom: 1.5rem;">Saved Addresses</h4>
      <div id="savedAddressesContainer"></div>
      <button class="btn-outline-gold mt-3" id="addAddressBtn" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:10px 24px; border-radius:40px;">
        <i class="fas fa-plus"></i> Add New Address
      </button>
    </div>
  </div>

  <!-- Reviews Tab -->
  <div id="tab-reviews" class="tab-content" style="display: none;">
    <div class="profile-card">
      <h4 style="color: var(--gold); margin-bottom: 1.5rem;">My Reviews</h4>
      <div id="myReviewsContainer"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
