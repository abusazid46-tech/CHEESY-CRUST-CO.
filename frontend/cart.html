<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Cheesy Crust Co.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0c0b09;
      font-family: 'Open Sans', sans-serif;
      color: #eeeeee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    :root {
      --gold: #cda45e;
      --gold-dark: #b58d4a;
      --dark-bg: #0c0b09;
      --card-bg: #1a1814;
    }
    .navbar {
      background: rgba(12, 11, 9, 0.95);
      padding: 1.2rem 0;
      border-bottom: 1px solid rgba(205, 164, 94, 0.2);
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold) !important;
    }
    .cart-container {
      max-width: 900px;
      margin: 120px auto 50px;
      padding: 0 20px;
      flex: 1;
    }
    .cart-header {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      margin-bottom: 2rem;
    }
    .cart-item {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(205,164,94,0.15);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .cart-item-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-name {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .cart-item-price {
      color: var(--gold);
      font-weight: 600;
    }
    .cart-summary {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(205,164,94,0.15);
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #0c0b09;
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      border-radius: 50px;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(205,164,94,0.3);
      color: #0c0b09;
    }
    .btn-outline-gold {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 8px 20px;
      border-radius: 40px;
    }
    .empty-cart {
      text-align: center;
      padding: 3rem;
      color: #888;
    }
  </style>
</head>
<body>

<nav class="navbar fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Cheesy Crust Co.</a>
    <a href="index.html" class="btn-outline-gold"><i class="fas fa-arrow-left"></i> Back to Menu</a>
  </div>
</nav>

<div class="cart-container">
  <h2 class="cart-header"><i class="fas fa-shopping-bag gold-icon"></i> Your Cart</h2>
  
  <div id="cart-items-container"></div>
  
  <div class="cart-summary mt-4" id="cart-summary" style="display: none;">
    <div class="d-flex justify-content-between mb-3">
      <span>Subtotal</span>
      <span id="cart-subtotal">₹0</span>
    </div>
    <div class="d-flex justify-content-between mb-3">
      <span>Delivery Fee</span>
      <span>₹40</span>
    </div>
    <hr style="border-color: #3a352e;">
    <div class="d-flex justify-content-between mb-3">
      <strong>Total</strong>
      <strong id="cart-total" style="color: var(--gold);">₹0</strong>
    </div>
    
    <!-- Order Type Selection -->
    <div class="mb-3">
      <label class="form-label" style="color: var(--gold);">Order Type</label>
      <select class="form-control" id="orderType" style="background: #0c0b09; color: white; border-color: #3a352e;">
        <option value="delivery">Delivery</option>
        <option value="takeaway">Takeaway</option>
      </select>
    </div>
    
    <div id="address-section" class="mb-3">
      <label class="form-label" style="color: var(--gold);">Delivery Address</label>
      <textarea class="form-control" id="deliveryAddress" rows="2" placeholder="Enter your full address" style="background: #0c0b09; color: white; border-color: #3a352e;"></textarea>
    </div>
    
    <button class="btn btn-gold w-100" id="checkoutBtn">Proceed to Checkout</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
