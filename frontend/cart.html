<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Cheesy Crust Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #cda45e;
            --dark-bg: #0c0b09;
            --card-bg: #1a1814;
        }
        
        body {
            background-color: var(--dark-bg);
            font-family: 'Poppins', sans-serif;
            color: #eeeeee;
        }
        
        .navbar {
            background: rgba(12, 11, 9, 0.95);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(205, 164, 94, 0.2);
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold) !important;
            font-family: 'Playfair Display', serif;
        }
        
        .cart-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(205,164,94,0.2);
        }
        
        .cart-summary {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            position: sticky;
            top: 100px;
            border: 1px solid rgba(205,164,94,0.3);
        }
        
        .btn-gold {
            background: var(--gold);
            color: #0c0b09;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 50px;
        }
        
        .quantity-btn {
            background: var(--gold);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
        }
        
        .text-gold {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-utensils"></i> Cheesy Crust Co.
            </a>
            <a href="index.html" class="btn btn-outline-gold">← Back to Menu</a>
        </div>
    </nav>
    
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-8">
                <h2 class="mb-4">Your Cart</h2>
                <div id="cartItemsContainer"></div>
            </div>
            <div class="col-lg-4">
                <div class="cart-summary">
                    <h4 class="text-gold mb-3">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tax (5%):</span>
                        <span id="tax">₹0</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <strong>Total:</strong>
                        <strong class="text-gold" id="total">₹0</strong>
                    </div>
                    <button class="btn btn-gold w-100" onclick="checkout()">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let cart = { items: [], total: 0 };
        
        function loadCart() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                displayCart();
            }
        }
        
        function displayCart() {
            const container = document.getElementById('cartItemsContainer');
            
            if (cart.items.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-shopping-cart fa-4x mb-3" style="color: var(--gold); opacity: 0.5;"></i>
                        <p>Your cart is empty</p>
                        <a href="index.html#menu" class="btn btn-gold">Browse Menu</a>
                    </div>
                `;
                updateSummary();
                return;
            }
            
            let html = '';
            cart.items.forEach(item => {
                html += `
                    <div class="cart-item">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <h5>${item.name}</h5>
                                <p class="text-gold">₹${item.price}</p>
                            </div>
                            <div class="col-md-4">
                                <div class="d-flex align-items-center gap-2">
                                    <button class="quantity-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                                    <span style="min-width: 40px; text-align: center;">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                                </div>
                            </div>
                            <div class="col-md-2 text-end">
                                <button class="btn btn-sm btn-danger" onclick="removeItem('${item.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            updateSummary();
        }
        
        function updateQuantity(id, change) {
            const item = cart.items.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart.items = cart.items.filter(i => i.id !== id);
                }
                saveCart();
                displayCart();
            }
        }
        
        function removeItem(id) {
            cart.items = cart.items.filter(i => i.id !== id);
            saveCart();
            displayCart();
        }
        
        function updateSummary() {
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = cart.total * 0.05;
            const total = cart.total + tax;
            
            document.getElementById('subtotal').innerText = `₹${cart.total}`;
            document.getElementById('tax').innerText = `₹${tax.toFixed(2)}`;
            document.getElementById('total').innerText = `₹${total.toFixed(2)}`;
        }
        
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        function updateCartCount() {
            const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            const cartBadge = document.getElementById('cartCount');
            if (cartBadge) cartBadge.innerText = count;
        }
        
        function checkout() {
            if (cart.items.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            alert('Order placed successfully! Total: ₹' + (cart.total + cart.total * 0.05).toFixed(2));
            localStorage.removeItem('cart');
            cart = { items: [], total: 0 };
            displayCart();
        }
        
        loadCart();
    </script>
</body>
</html>
